<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LyriSoul — Spotify Lyrics Player</title>
  <meta name="description" content="Real-time synced lyrics for your Spotify music" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="icon" type="image/png" href="/static/icon.png" />
  <link rel="stylesheet" href="/static/style.css?v=0326.1545" />
  <!-- i18n must load before app.js -->
  <script src="/static/i18n.js?v=0326.1545"></script>
</head>

<body>

  <!-- Dynamic Album Art Background -->
  <div class="bg-canvas">
    <img id="bg-album-art" src="" alt="" crossorigin="anonymous" />
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="bg-overlay"></div>
    <div class="noise"></div>
  </div>

  <!-- ── Login Screen ─────────────────────────────────────── -->
  <div id="login-screen" class="screen active">
    <div class="login-card glass">
      <!-- MAIN LOGIN VIEW -->
      <div id="login-content">
        <div class="app-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="url(#grad-badge)"></circle>
            <g transform="translate(0, 3)">
              <path d="M14 30 Q18 16 24 20 Q30 24 34 12" stroke="white" stroke-width="2.5" stroke-linecap="round"
                fill="none"></path>
              <circle cx="20" cy="26" r="2" fill="white" opacity="0.8"></circle>
              <circle cx="28" cy="14" r="2" fill="white" opacity="0.8"></circle>
            </g>
            <defs>
              <linearGradient id="grad-badge" x1="0" y1="0" x2="48" y2="48">
                <stop offset="0%" stop-color="#1DB954"></stop>
                <stop offset="100%" stop-color="#0d7a35"></stop>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="login-title">LyriSoul</h1>
        <p class="login-sub" data-i18n="login_sub">实时同步歌词，跟随音乐律动</p>
        <a id="login-btn" href="/auth/login" class="btn-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" />
          </svg>
          <span data-i18n="btn_login_spotify">使用 Spotify 登录</span>
        </a>

        <div class="login-config-split">
          <button id="btn-open-config" class="btn-icon-tiny" data-i18n-title="btn_open_config_title"
            title="Configure API">
            <span data-i18n="btn_open_config">⚙️ 配置 API</span>
          </button>
        </div>
      </div>

      <!-- CONFIGURATION VIEW (BYOK - Bring Your Own Key) -->
      <div id="config-content" class="hidden">
        <h2 class="config-title" data-i18n="config_title">应用配置 (BYOK)</h2>
        <p class="config-sub"
          style="font-size: 0.85rem; line-height: 1.4; color: rgba(255,255,255,0.7); margin-bottom: 20px;">
          <span data-i18n="config_sub_byok_1">Spotify限制开发者接口额度。请前往 </span>
          <a href="https://developer.spotify.com/dashboard" target="_blank"
            style="color: #1DB954; text-decoration: underline;">Spotify Developer</a>
          <span data-i18n="config_sub_byok_2"> 免费创建一个App，并获取您专属的 Client ID 以解锁本地听歌权限。不填此项将无法登录。</span>
        </p>

        <div class="form-group">
          <label for="cfg-client-id" data-i18n="lbl_client_id">Client ID</label>
          <input type="text" id="cfg-client-id" data-i18n-placeholder="cfg_client_id_placeholder"
            placeholder="例如: 1a2b3c4d5e..." autocomplete="off">
        </div>

        <div class="form-group" style="display: none;">
          <label for="cfg-redirect-uri" data-i18n="lbl_redirect_uri">Redirect URI</label>
          <input type="text" id="cfg-redirect-uri" value="http://127.0.0.1:666/callback">
        </div>

        <div class="config-actions">
          <button id="btn-cancel-config" class="btn-cancel" data-i18n="btn_cancel">返回</button>
          <button id="btn-save-config" class="btn-save" data-i18n="btn_save_login">保存 API 密钥</button>
        </div>
      </div>
    </div>
  </div>
  <!-- ── Player Screen ────────────────────────────────────── -->
  <div id="player-screen" class="screen">

    <!-- Top bar -->
    <header class="topbar glass-subtle">
      <div class="topbar-left">
        <div class="app-badge">
          <svg width="30" height="30" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="url(#grad-badge)"></circle>
            <g transform="translate(0, 3)">
              <path d="M14 30 Q18 16 24 20 Q30 24 34 12" stroke="white" stroke-width="2.5" stroke-linecap="round"
                fill="none"></path>
              <circle cx="20" cy="26" r="2" fill="white" opacity="0.8"></circle>
              <circle cx="28" cy="14" r="2" fill="white" opacity="0.8"></circle>
            </g>
            <defs>
              <linearGradient id="grad-badge" x1="0" y1="0" x2="48" y2="48">
                <stop offset="0%" stop-color="#1DB954"></stop>
                <stop offset="100%" stop-color="#0d7a35"></stop>
              </linearGradient>
            </defs>
          </svg>
          LyriSoul
        </div>
      </div>
      <div class="topbar-right">
        <!-- Window controls removed for commercial build (rely on pystray) -->
        <!-- User Avatar Button -->
        <div class="user-menu-wrap" id="user-menu-wrap">
          <button class="user-avatar-btn" id="user-avatar-btn" aria-label="User menu" aria-expanded="false">
            <img id="user-avatar-img" src="" alt="" class="user-avatar-img hidden" />
            <span id="user-avatar-initials" class="user-avatar-initials">?</span>
          </button>
          <span class="user-avatar-tooltip" id="user-avatar-tooltip"></span>

          <!-- Dropdown Menu -->
          <div class="user-dropdown" id="user-dropdown" role="menu">
            <!-- Profile header inside dropdown -->
            <div class="user-dropdown-header" id="user-dropdown-header">
              <img id="dd-avatar-img" src="" alt="" class="dd-avatar-img hidden" />
              <span id="dd-avatar-initials" class="dd-avatar-initials">?</span>
              <div class="dd-user-info">
                <span class="dd-user-name" id="dd-user-name">—</span>
                <span class="dd-user-followers" id="dd-user-followers"></span>
              </div>
            </div>

            <button class="user-dropdown-item" id="dd-profile" role="menuitem">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path
                  d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
              </svg>
              <span data-i18n="menu_profile">用户资料</span>
            </button>


            <button class="user-dropdown-item" id="dd-lang" role="menuitem">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path
                  d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z" />
              </svg>
              <span id="dd-lang-label" data-i18n="menu_lang">中 / EN</span>
            </button>

            <button class="user-dropdown-item" id="dd-about" role="menuitem">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path
                  d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" />
              </svg>
              <span data-i18n="menu_about">关于 LyriSoul</span>
            </button>


            <a href="javascript:void(0)" class="user-dropdown-item user-dropdown-logout" role="menuitem" id="dd-logout">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path
                  d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
              </svg>
              <span data-i18n="btn_logout">退出账号</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- Main layout -->
    <main class="player-layout">

      <!-- LEFT: Track info + visualizer -->
      <aside class="track-panel">

        <!-- Album Art -->
        <div class="album-wrapper">
          <div class="album-glow" id="album-glow"></div>
          <img id="album-art" class="album-art" src="" alt="Album Art" crossorigin="anonymous" />
          <div class="vinyl-ring"></div>
        </div>

        <!-- Track meta -->
        <div class="track-meta">
          <h2 id="track-name" class="track-name">—</h2>
          <p id="artist-name" class="artist-name">—</p>
          <p id="album-name" class="album-name-small">—</p>
        </div>

        <!-- Player Controls -->
        <div class="player-controls">
          <button class="control-btn" id="btn-shuffle" data-i18n-title="btn_shuffle_title" title="Shuffle">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
              <path
                d="M13.151.922a.75.75 0 1 0-1.06 1.06L13.109 3H11.16a3.75 3.75 0 0 0-2.873 1.34l-6.173 7.356A2.25 2.25 0 1 1 .39 12.5H0V14h.391a3.75 3.75 0 0 0 2.873-1.34l6.173-7.356a2.25 2.25 0 0 1 1.724-.804h1.947l-1.017 1.018a.75.75 0 0 0 1.06 1.06L15.98 3.75 13.15.922zM.391 3.5H0V2h.391c1.109 0 2.16.49 2.873 1.34L4.89 5.277l-.979 1.167-1.796-2.14A2.25 2.25 0 0 0 .39 3.5z" />
              <path
                d="m7.5 10.723.98-1.167 1.795 2.14A2.25 2.25 0 0 0 11.996 12.5h1.95l-1.018-1.018a.75.75 0 1 1 1.06-1.06l2.829 2.828-2.829 2.828a.75.75 0 1 1-1.06-1.06L13.948 14H11.996a3.75 3.75 0 0 1-2.873-1.34l-1.623-1.937z" />
            </svg>
          </button>
          <button class="control-btn" id="btn-prev" data-i18n-title="btn_prev_title" title="Previous">
            <svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
              <path
                d="M3.3 1a.7.7 0 0 1 .7.7v5.15l9.95-5.744a.7.7 0 0 1 1.05.606v12.575a.7.7 0 0 1-1.05.607L4 9.149V14.3a.7.7 0 0 1-.7.7H1.7a.7.7 0 0 1-.7-.7V1.7a.7.7 0 0 1 .7-.7h1.6z" />
            </svg>
          </button>
          <button class="control-btn play-btn" id="btn-play-pause" data-i18n-title="btn_play_pause_title"
            title="Play/Pause">
            <!-- Default to Play icon -->
            <svg id="icon-play" viewBox="0 0 16 16" width="24" height="24" fill="currentColor">
              <path
                d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288V1.713z" />
            </svg>
            <svg id="icon-pause" viewBox="0 0 16 16" width="24" height="24" fill="currentColor" style="display:none;">
              <path
                d="M2.7 1a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7H2.7zm8 0a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7h-2.6z" />
            </svg>
          </button>
          <button class="control-btn" id="btn-next" data-i18n-title="btn_next_title" title="Next">
            <svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
              <path
                d="M12.7 1a.7.7 0 0 0-.7.7v5.15L2.05 1.106A.7.7 0 0 0 1 1.712v12.575a.7.7 0 0 0 1.05.607L12 9.149V14.3a.7.7 0 0 0 .7.7h1.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7h-1.6z" />
            </svg>
          </button>
          <button class="control-btn" id="btn-repeat" data-i18n-title="btn_repeat_title" title="Repeat">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
              <path
                d="M0 4.75A3.75 3.75 0 0 1 3.75 1h8.5A3.75 3.75 0 0 1 16 4.75v5a3.75 3.75 0 0 1-3.75 3.75H9.81l1.018 1.018a.75.75 0 1 1-1.06 1.06L6.939 12.75l2.829-2.828a.75.75 0 1 1 1.06 1.06L9.811 12h2.439a2.25 2.25 0 0 0 2.25-2.25v-5a2.25 2.25 0 0 0-2.25-2.25h-8.5A2.25 2.25 0 0 0 1.5 4.75v5A2.25 2.25 0 0 0 3.75 12H5v1.5H3.75A3.75 3.75 0 0 1 0 9.75v-5z" />
              <text id="repeat-track-num" x="8" y="8" font-size="8" font-weight="900" fill="currentColor"
                text-anchor="middle" dominant-baseline="middle" style="display:none">1</text>
            </svg>
          </button>
        </div>

        <!-- Progress bar -->
        <div class="progress-section">
          <div class="progress-bar-wrap">
            <div class="progress-bar-bg">
              <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
          </div>
          <div class="progress-times">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>


      </aside>

      <!-- RIGHT: Lyrics -->
      <section class="lyrics-panel">

        <div class="lyrics-header">
          <span class="lyrics-label" data-i18n="title_lyrics">歌 词</span>
          <span id="lyrics-source" class="lyrics-source-tag"></span>
          <button id="btn-share-card" class="share-card-btn" data-i18n-title="btn_share_tooltip"
            title="Share Lyrics Card">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3" />
              <circle cx="6" cy="12" r="3" />
              <circle cx="18" cy="19" r="3" />
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
            </svg>
          </button>
        </div>

        <div id="lyrics-container" class="lyrics-container">
          <div id="lyrics-idle" class="lyrics-idle">
            <div class="idle-icon">🎵</div>
            <p data-i18n="idle_waiting">正在等待音乐播放…</p>
          </div>
          <div id="lyrics-list" class="lyrics-list"></div>
        </div>

      </section>

    </main>

    <!-- Nothing playing overlay -->
    <div id="nothing-playing" class="nothing-playing hidden">
      <div class="np-content glass">
        <div class="np-icon">⏸</div>
        <p data-i18n="np_title">当前没有音乐播放</p>
        <p class="np-hint" data-i18n="np_hint">打开 Spotify 开始播放吧</p>
      </div>
    </div>

  </div><!-- /player-screen -->

  <!-- Share Card Modal -->
  <div id="share-modal" class="share-modal hidden">
    <div class="share-modal-backdrop"></div>
    <div class="share-modal-box">
      <div class="share-modal-header">
        <span class="share-modal-title" data-i18n="share_title">分享歌词卡片</span>
        <button id="share-modal-close" class="share-close-btn">×</button>
      </div>
      <!-- Lyric picker -->
      <div id="share-lyric-picker" class="share-lyric-picker"></div>
      <!-- Canvas preview -->
      <div class="share-canvas-wrap">
        <canvas id="share-canvas"></canvas>
      </div>
      <div class="share-modal-actions">
        <button id="btn-download-card" class="share-download-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span data-i18n="share_btn_dl">下载卡片</span>
        </button>
      </div>
    </div>
  </div>
  <!-- Resizer Handle -->
  <div id="resizer"></div>

  <script src="/static/app.js?v=0326.1545"></script>
</body>


</html>
